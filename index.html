<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#e07b4c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="共享点餐">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🍳 小王的厨房</title>
    <script>
        (function() {
            const m = {
                name: '小王的厨房',
                short_name: '点餐',
                start_url: location.href.split('?')[0],
                display: 'standalone',
                background_color: '#faf7f4',
                theme_color: '#e07b4c',
                icons: [{
                    src: 'data:image/svg+xml,' + encodeURIComponent(
                        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="32" fill="#e07b4c"/><text x="96" y="130" font-size="96" text-anchor="middle">🍳</text></svg>'
                    ),
                    sizes: '192x192',
                    type: 'image/svg+xml'
                }]
            };
            const b = new Blob([JSON.stringify(m)], { type: 'application/json' });
            const l = document.createElement('link');
            l.rel = 'manifest';
            l.href = URL.createObjectURL(b);
            document.head.appendChild(l);
        })();
    </script>
    <script>
        window.__gunLoaded = false;
        window.__seaLoaded = false;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gun@0.2020.1237/gun.js"
        onload="window.__gunLoaded=true;" onerror="var s=document.createElement('script');s.src='https://unpkg.com/gun@0.2020.1237/gun.js';s.onload=function(){window.__gunLoaded=true;};document.head.appendChild(s);">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/gun@0.2020.1237/sea.js" onload="window.__seaLoaded=true;" onerror="">
    </script>

    <style>
        :root {
            --primary: #e07b4c;
            --primary-dark: #c96a3d;
            --primary-light: #fce8df;
            --bg: #faf7f4;
            --card-bg: #fff;
            --text: #3d3029;
            --text-light: #7a6e63;
            --border: #e8ddd3;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 8px;
            --success: #5a9e6f;
            --success-light: #e8f5ec;
            --danger: #d45b4a;
            --danger-light: #fef0ee;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --game-bg: #1a1a2e;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: env(safe-area-inset-bottom);
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            line-height: 1.5;
        }
        .app-header {
            background: rgba(255, 255, 255, 0.92);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .app-logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            white-space: nowrap;
        }
        .room-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #f5f0ea;
            border-radius: 22px;
            padding: 5px 14px;
            font-size: 0.82rem;
        }
        .room-badge input {
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--primary);
            width: 65px;
            text-align: center;
            outline: none;
            font-size: 0.82rem;
        }
        .room-badge button {
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 16px;
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .room-badge button:active {
            transform: scale(0.94);
            opacity: 0.85;
        }
        .connection-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ccc;
            flex-shrink: 0;
            transition: background 0.3s, box-shadow 0.3s;
        }
        .connection-dot.connected {
            background: var(--success);
            box-shadow: 0 0 6px rgba(90, 158, 111, 0.5);
        }
        .connection-dot.syncing {
            background: #f0c040;
            box-shadow: 0 0 8px rgba(240, 192, 64, 0.6);
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 4px rgba(240, 192, 64, 0.4);
            }
            50% {
                box-shadow: 0 0 14px rgba(240, 192, 64, 0.8);
            }
        }
        .connection-text {
            font-size: 0.7rem;
            color: #aaa;
            white-space: nowrap;
        }
        .btn-install {
            display: none;
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: #fff;
            color: var(--primary);
            font-size: 0.78rem;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-install.show {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-nick {
            padding: 7px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: #fff;
            color: var(--text);
            font-size: 0.78rem;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            white-space: nowrap;
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .btn-nick.has-nick {
            color: var(--primary);
            border-color: var(--primary-light);
            background: #fffaf7;
            font-weight: 600;
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            background: #f5f0ea;
            border-radius: 28px;
            padding: 4px;
            flex-wrap: wrap;
        }
        .nav-tab {
            padding: 8px 14px;
            border-radius: 24px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.84rem;
            color: var(--text-light);
            transition: 0.2s;
            white-space: nowrap;
            font-weight: 500;
        }
        .nav-tab.active {
            background: #fff;
            color: var(--primary);
            font-weight: 650;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .nav-tab .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            background: #e85d3f;
            color: #fff;
            font-size: 0.68rem;
            margin-left: 4px;
            padding: 0 5px;
            font-weight: 700;
        }
        .main-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }
        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .search-box {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
        }
        .search-box input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1.5px solid var(--border);
            font-size: 0.9rem;
            background: #fff;
            outline: none;
        }
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 14px;
        }
        .cat-btn {
            padding: 6px 15px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-light);
            transition: 0.2s;
        }
        .cat-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .dish-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 12px;
        }
        .dish-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 16px 12px;
            box-shadow: var(--shadow);
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            position: relative;
        }
        .dish-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
            transform: translateY(-2px);
        }
        .dish-card:active {
            transform: scale(0.97);
        }
        .dish-card .tutorial-hint {
            position: absolute;
            top: 8px;
            right: 10px;
            font-size: 0.7rem;
            color: #c9a87c;
            opacity: 0.7;
            pointer-events: none;
        }
        .dish-card .video-hint {
            position: absolute;
            top: 8px;
            left: 10px;
            font-size: 0.7rem;
            color: #5a8fbf;
            opacity: 0.7;
            pointer-events: none;
        }
        .dish-icon-wrap {
            width: 60px;
            height: 60px;
            margin: 0 auto 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .dish-icon-wrap svg {
            width: 100%;
            height: 100%;
        }
        .dish-name {
            font-weight: 650;
            margin: 4px 0;
            font-size: 0.95rem;
            pointer-events: none;
        }
        .dish-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 1.05rem;
            pointer-events: none;
        }
        .btn-add-cart {
            margin-top: 10px;
            padding: 7px 18px;
            border-radius: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            width: 100%;
            transition: 0.15s;
            position: relative;
            z-index: 2;
        }
        .btn-add-cart:active {
            transform: scale(0.95);
            opacity: 0.85;
        }
        .btn-qty {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: #fff;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            position: relative;
            z-index: 2;
        }
        .btn-qty:active {
            transform: scale(0.9);
        }
        .btn-qty.plus {
            border-color: var(--primary);
            color: var(--primary);
        }
        .btn-qty.minus {
            border-color: #d0c8bd;
            color: #8c7b6b;
        }
        .card-cart-ctrl {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            font-weight: 600;
            position: relative;
            z-index: 2;
        }
        .cart-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .cart-item-card {
            background: #fff;
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid transparent;
            flex-wrap: wrap;
        }
        .cart-item-icon,
        .order-item-icon {
            width: 52px;
            height: 52px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-item-icon svg,
        .order-item-icon svg {
            width: 100%;
            height: 100%;
        }
        .cart-item-info {
            flex: 1;
            min-width: 0;
        }
        .cart-item-info .ci-name {
            font-weight: 650;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--primary);
            text-decoration: underline;
            text-decoration-color: transparent;
            transition: 0.2s;
        }
        .cart-item-info .ci-name:hover {
            text-decoration-color: var(--primary);
        }
        .cart-item-info .ci-unit-price {
            font-size: 0.78rem;
            color: var(--text-light);
        }
        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .cart-item-qty span.qty-val {
            font-weight: 700;
            min-width: 22px;
            text-align: center;
        }
        .cart-item-subtotal {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.05rem;
            flex-shrink: 0;
            min-width: 55px;
            text-align: right;
        }
        .cart-item-remove {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: #fef0ee;
            color: var(--danger);
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.15s;
        }
        .cart-item-remove:active {
            background: #fdd;
            transform: scale(0.9);
        }
        .cart-empty-state {
            text-align: center;
            padding: 50px 20px;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }
        .cart-summary-bar {
            background: #fff;
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            position: sticky;
            bottom: 8px;
            border: 2px solid #fdf0e8;
        }
        .shared-orders-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 58vh;
            overflow-y: auto;
            padding-right: 4px;
        }
        .date-group {
            margin-bottom: 4px;
        }
        .date-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: #fdfaf6;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 650;
            font-size: 0.85rem;
            color: var(--text);
            transition: 0.2s;
            user-select: none;
            border: 1px solid #f0ece6;
        }
        .date-group-header:hover {
            background: #fdf0e8;
        }
        .date-group-header .collapse-arrow {
            transition: transform 0.25s;
            font-size: 0.7rem;
            display: inline-block;
        }
        .date-group-header.collapsed .collapse-arrow {
            transform: rotate(-90deg);
        }
        .date-group-body {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            max-height: 3000px;
            opacity: 1;
        }
        .date-group-body.collapsed {
            max-height: 0;
            opacity: 0;
        }
        .date-group-body-inner {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 6px;
        }
        .order-item {
            background: #fff;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid transparent;
            flex-wrap: wrap;
        }
        .order-item.confirmed {
            border-left-color: var(--success);
            opacity: 0.75;
            background: #fdfefd;
        }
        .order-item.confirmed .oi-name {
            text-decoration: line-through;
            text-decoration-color: #ccc;
        }
        .order-item .oi-info {
            flex: 1;
            min-width: 0;
        }
        .order-item .oi-name {
            font-weight: 650;
            font-size: 0.92rem;
            cursor: pointer;
            color: var(--primary);
        }
        .order-item .oi-name:hover {
            text-decoration: underline;
        }
        .order-item .oi-user {
            font-size: 0.78rem;
            color: var(--text-light);
        }
        .order-item .oi-time {
            font-size: 0.72rem;
            color: #aaa;
        }
        .order-item .oi-note {
            font-size: 0.74rem;
            color: var(--primary);
            font-style: italic;
            background: #fffaf7;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
        }
        .order-item .oi-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .btn-confirm {
            background: var(--success);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            transition: 0.15s;
        }
        .btn-confirm:active {
            transform: scale(0.94);
            opacity: 0.85;
        }
        .badge-confirmed {
            background: var(--success-light);
            color: var(--success);
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        .summary-bar {
            background: #fff;
            border-radius: var(--radius);
            padding: 14px 18px;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-section {
            margin-top: 20px;
            border-top: 2px solid var(--border);
            padding-top: 14px;
        }
        .history-date-group-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #f9f6f1;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            color: var(--text);
            transition: 0.2s;
            user-select: none;
            border: 1px solid #ece6db;
        }
        .history-date-group-header:hover {
            background: #f5ede3;
        }
        .history-date-group-header .collapse-arrow {
            transition: transform 0.25s;
            font-size: 0.7rem;
            display: inline-block;
        }
        .history-date-group-header.collapsed .collapse-arrow {
            transform: rotate(-90deg);
        }
        .history-date-group-body {
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            max-height: 3000px;
            opacity: 1;
        }
        .history-date-group-body.collapsed {
            max-height: 0;
            opacity: 0;
        }
        .history-date-group-body-inner {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding-top: 4px;
        }
        .history-item {
            background: #fdfcfb;
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.88rem;
            border: 1px solid #f0ece6;
            flex-wrap: wrap;
        }
        .toast-container {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: none;
            max-width: 90vw;
        }
        .toast {
            padding: 10px 18px;
            border-radius: 24px;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            animation: toastIn 0.4s ease;
            pointer-events: auto;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            word-break: break-word;
        }
        .toast-success {
            background: var(--success);
        }
        .toast-info {
            background: #5a8fbf;
        }
        .toast-warning {
            background: #e09b4c;
        }
        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-dialog {
            background: #fff;
            border-radius: var(--radius);
            padding: 24px 20px;
            max-width: 520px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            max-height: 85vh;
            overflow-y: auto;
        }
        .modal-dialog .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 8px 18px;
            border-radius: 24px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.84rem;
            transition: 0.2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn:active {
            transform: scale(0.94);
            opacity: 0.85;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-secondary {
            background: #f5f0ea;
            color: var(--text);
        }
        .btn-danger-outline {
            background: #fff;
            color: var(--danger);
            border: 1.5px solid #f0d0ca;
        }
        .btn-xs {
            padding: 4px 10px;
            font-size: 0.7rem;
            border-radius: 14px;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 18px;
        }
        .btn-accent {
            background: #5a8fbf;
            color: #fff;
        }
        .mgmt-dish-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }
        .mgmt-dish-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 8px;
            border-bottom: 1px solid #f0ece6;
            flex-wrap: wrap;
        }
        .emoji-opt {
            width: 34px;
            height: 34px;
            border: none;
            background: #f5f0ea;
            border-radius: 50%;

            background: #e8ddd3;

        .form-group {
            margin-bottom: 10px;

        .sync-status-bar {

        .sync-status-bar.local {
            background: #fffbf0;

            border: 1px solid #f0d080;
        }
        .sync-status-bar.online {
            background: #f0faf4;
            color: #2d6a3f;
            border: 1px solid #b8dcc8;
        }
        .sync-status-bar.connecting {
            background: #f8f4ff;

        .game-selector {
            display: flex;
            gap: 10px;

        .game-select-btn {
            padding: 10px 20px;
            border-radius: 24px;
            border: 2px solid var(--border);

            font-size: 0.9rem;
            transition: 0.2s;

            align-items: center;

        .game-select-btn.active {
            border-color: var(--primary);
            background: var(--primary-light);

        }
        .game-container {
            background: #fff;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);

        .snake-canvas-wrap,
        .breakout-canvas-wrap {
            display: flex;
            justify-content: center;

        #snakeCanvas,
        #breakoutCanvas {
            border-radius: 12px;
            background: var(--game-bg);

            touch-action: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        }
        .snake-info,
        .breakout-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;

        .snake-score,
        .breakout-score {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);

        .snake-high-score,
        .breakout-high-score {

            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 12px;

            justify-content: center;

        @media (max-width: 768px) {
            .dish-grid {
                grid-template-columns: repeat(2, 1fr);

                flex-direction: column;

            }
            #snakeCanvas,
            #breakoutCanvas {
                width: 100%;
                max-width: 360px;
            }
        }
    </style>
</head>
<body>

            <div class="category-filter" id="categoryFilter"></div>

        <section class="page" id="page-shared">
            <div class="sync-status-bar local" id="syncStatusBar"><span id="syncStatusIcon">📡</span><span id="syncStatusText">本地模式</span><button class="btn btn-xs btn-secondary" id="btnRefreshShared" style="margin-left:auto;">🔄 刷新</button></div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">

                </div>
            </div>
            <div class="shared-orders-list" id="sharedOrdersList"><div style="text-align:center;color:#aaa;padding:30px;">暂无共享订单</div></div>
            <div class="summary-bar" id="sharedSummary" style="display:none;"><div><strong>合计：</strong><span id="sharedTotalPrice" style="font-size:1.2rem;color:var(--primary);font-weight:700;">¥0.00</span></div><div><span id="sharedTotalItems">0</span> 道菜</div></div>
            <div class="history-section" id="historySection" style="display:none;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <h4 style="margin:0;">📜 历史订单</h4>

                </div>
                <div id="historyList"></div>

        </section>
        <section class="page" id="page-manage">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div style="background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);">
                    <h3 id="mgmtFormTitle">➕ 添加新菜品</h3>
                    <div class="form-group"><label>📛 菜名</label><input type="text" id="mgmtName" placeholder="例如：红烧肉"></div>
                    <div class="form-group"><label>💰 价格</label><input type="number" id="mgmtPrice" step="0.01" min="0.01" placeholder="0.00"></div>
                    <div class="form-group"><label>📂 分类</label><input type="text" id="mgmtCategory" list="cats" placeholder="荤菜/素菜/汤品/主食/其他"><datalist id="cats"><option value="荤菜"><option value="素菜"><option value="汤品"><option value="主食"><option value="凉菜"><option value="小吃"><option value="饮品"><option value="其他"></datalist></div>
                    <div class="form-group"><label>🎨 图标</label><input type="text" id="mgmtEmoji" maxlength="4" placeholder="🍖"><div class="emoji-picker-row" id="emojiPicker" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;"></div></div>
                    <div class="form-group"><label>📝 描述</label><textarea id="mgmtDesc" rows="2" placeholder="简短描述..."></textarea></div>
                    <div class="form-group"><label>📖 详细教程</label><textarea id="mgmtTutorial" rows="4" placeholder="详细烹饪教程...&#10;例如：1.准备食材...&#10;2.热锅凉油...&#10;3.翻炒调味..."></textarea></div>
                    <div class="form-group"><label>🎬 视频教程链接</label><input type="text" id="mgmtVideo" placeholder="粘贴视频链接（YouTube/B站/MP4等）"><small style="color:#999;">支持YouTube、B站链接或直链视频地址</small></div>
                    <input type="hidden" id="mgmtEditId">
                    <div style="display:flex;gap:8px;margin-top:12px;"><button class="btn btn-primary" id="btnSaveDish">💾 保存</button><button class="btn btn-secondary" id="btnCancelEdit" style="display:none;">取消</button></div>
                </div>
                <div style="background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);">

                    <button class="btn btn-danger-outline btn-sm" id="btnResetMenu" style="margin-top:12px;">🔄 恢复默认</button>

        </section>
        <section class="page" id="page-game">
            <div class="game-selector">
                <button class="game-select-btn active" data-game="snake">🐍 贪吃蛇</button>
                <button class="game-select-btn" data-game="guess">🎯 猜数字</button>
                <button class="game-select-btn" data-game="breakout">🧱 打砖块</button>
            </div>
            <div class="game-container" id="gameSnakeContainer">
                <div class="snake-info"><span class="snake-score">🍎 得分：<span id="snakeScore">0</span></span><span class="snake-high-score">🏆 最高：<span id="snakeHighScore">0</span></span><button class="btn btn-primary btn-sm" id="btnSnakeRestart">🔄 重新开始</button></div>
                <div class="snake-canvas-wrap" id="snakeCanvasWrap"><canvas id="snakeCanvas" width="400" height="400"></canvas></div>
                <div class="snake-hint">⌨️ 键盘方向键 / 📱 触屏滑动 控制方向 · 🔄 穿墙模式（碰壁从对面出）</div>
            </div>
            <div class="game-container" id="gameGuessContainer" style="display:none;">
                <h3 style="margin-bottom:8px;">🎯 猜数字 (1-100)</h3>

                <div class="guess-section">
                    <div class="guess-input-row"><input type="number" id="guessInput" min="1" max="100" placeholder="输入数字..."><button class="btn btn-primary" id="btnGuessSubmit">猜！</button></div>
                    <p id="guessHint" style="font-weight:600;min-height:24px;"></p>
                    <button class="btn btn-secondary btn-sm" id="btnGuessRestart" style="display:none;">🔄 再来一局</button>
                    <div class="guess-history" id="guessHistory"></div>

            </div>
            <div class="game-container" id="gameBreakoutContainer" style="display:none;">
                <div class="breakout-info"><span class="breakout-score">🧱 得分：<span id="breakoutScore">0</span></span><span class="breakout-high-score">🏆 最高：<span id="breakoutHighScore">0</span></span><button class="btn btn-primary btn-sm" id="btnBreakoutRestart">🔄 重新开始</button></div>
                <div class="breakout-canvas-wrap" id="breakoutCanvasWrap"><canvas id="breakoutCanvas" width="400" height="400"></canvas></div>
                <div class="breakout-hint">⌨️ 左右方向键 / 📱 触屏滑动 控制挡板</div>
            </div>
        </section>
    </main>
    <div class="toast-container" id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script>
        (function() {
            // ========== 音效系统 ==========
            const SoundFX = {
                ctx: null,
                _bgmInterval: null,
                _bgmOsc: null,
                _bgmGain: null,
                _guessBgmOsc: null,
                _guessBgmGain: null,
                _guessBgwOsc2: null,
                _guessBgwGain2: null,
                init() { try { this.ctx = new(window.AudioContext || window.webkitAudioContext)(); } catch (e) {} },
                ensureCtx() {
                    if (!this.ctx) this.init();
                    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
                },
                play(freq, duration, type = 'square', vol = 0.08) {
                    this.ensureCtx();
                    if (!this.ctx) return;
                    try {
                        const osc = this.ctx.createOscillator();
                        const gain = this.ctx.createGain();
                        osc.type = type;
                        osc.frequency.value = freq;
                        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                        osc.connect(gain);
                        gain.connect(this.ctx.destination);
                        osc.start();
                        osc.stop(this.ctx.currentTime + duration);
                    } catch (e) {}
                },
                eat() { this.play(600, 0.08, 'square', 0.06);
                    setTimeout(() => this.play(900, 0.06, 'square', 0.05), 40); },
                gameOver() { this.play(200, 0.25, 'sawtooth', 0.1);
                    setTimeout(() => this.play(150, 0.3, 'sawtooth', 0.08), 150);
                    setTimeout(() => this.play(100, 0.4, 'triangle', 0.06), 300); },
                click() { this.play(1000, 0.04, 'sine', 0.04); },
                success() { this.play(500, 0.06, 'sine', 0.06);
                    setTimeout(() => this.play(700, 0.06, 'sine', 0.06), 60);
                    setTimeout(() => this.play(900, 0.08, 'sine', 0.06), 120); },
                wrong() { this.play(300, 0.12, 'triangle', 0.05); },
                guessCorrect() { this.play(400, 0.08, 'sine', 0.08);
                    setTimeout(() => this.play(600, 0.08, 'sine', 0.08), 80);
                    setTimeout(() => this.play(800, 0.08, 'sine', 0.08), 160);
                    setTimeout(() => this.play(1000, 0.12, 'sine', 0.08), 240); },
                confirm() { this.play(440, 0.06, 'sine', 0.06);
                    setTimeout(() => this.play(660, 0.06, 'sine', 0.06), 60);
                    setTimeout(() => this.play(880, 0.1, 'sine', 0.07), 120); },
                move() { this.play(200, 0.03, 'sine', 0.03); },
                paddle() { this.play(800, 0.04, 'triangle', 0.05); },
                brick() { this.play(1200, 0.05, 'square', 0.06); },
                pinballBounce() { this.play(400, 0.05, 'triangle', 0.05); },
                startSnakeBgm(speedMs = 200) {
                    this.stopSnakeBgm();
                    this.ensureCtx();
                    if (!this.ctx) return;
                    try {
                        this._bgmInterval = setInterval(() => {
                            if (!this.ctx || this.ctx.state === 'closed') { this.stopSnakeBgm(); return; }
                            try {
                                const osc = this.ctx.createOscillator();
                                const gain = this.ctx.createGain();
                                osc.type = 'sine';
                                osc.frequency.value = 110;
                                gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.06);
                                osc.connect(gain);
                                gain.connect(this.ctx.destination);
                                osc.start();
                                osc.stop(this.ctx.currentTime + 0.07);
                            } catch (e) {}
                        }, speedMs);
                    } catch (e) {}
                },
                stopSnakeBgm() {
                    if (this._bgmInterval) { clearInterval(this._bgmInterval);
                        this._bgmInterval = null; }
                    if (this._bgmOsc) { try { this._bgmOsc.stop(); } catch (e) {} this._bgmOsc = null; }
                    if (this._bgmGain) { this._bgmGain = null; }
                },
                updateSnakeBgmSpeed(speedMs) {
                    if (this._bgmInterval) {
                        clearInterval(this._bgmInterval);
                        this._bgmInterval = setInterval(() => {
                            if (!this.ctx || this.ctx.state === 'closed') { this.stopSnakeBgm(); return; }
                            try {
                                const osc = this.ctx.createOscillator();
                                const gain = this.ctx.createGain();
                                osc.type = 'sine';
                                osc.frequency.value = 110;
                                gain.gain.setValueAtTime(0.03, this.ctx.currentTime);
                                gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.06);
                                osc.connect(gain);
                                gain.connect(this.ctx.destination);
                                osc.start();
                                osc.stop(this.ctx.currentTime + 0.07);
                            } catch (e) {}
                        }, speedMs);
                    }
                },
                startGuessBgm() {
                    this.stopGuessBgm();
                    this.ensureCtx();
                    if (!this.ctx) return;
                    try {
                        this._guessBgmOsc = this.ctx.createOscillator();
                        this._guessBgmGain = this.ctx.createGain();
                        this._guessBgmOsc.type = 'sine';
                        this._guessBgmOsc.frequency.value = 80;
                        this._guessBgmGain.gain.setValueAtTime(0.02, this.ctx.currentTime);
                        this._guessBgmOsc.connect(this._guessBgmGain);
                        this._guessBgmGain.connect(this.ctx.destination);
                        this._guessBgmOsc.start();

                        this._guessBgwOsc2 = this.ctx.createOscillator();
                        this._guessBgwGain2 = this.ctx.createGain();
                        this._guessBgwOsc2.type = 'sine';
                        this._guessBgwOsc2.frequency.value = 120;
                        this._guessBgwGain2.gain.setValueAtTime(0.015, this.ctx.currentTime);
                        this._guessBgwOsc2.connect(this._guessBgwGain2);
                        this._guessBgwGain2.connect(this.ctx.destination);
                        this._guessBgwOsc2.start();
                    } catch (e) {}
                },
                stopGuessBgm() {
                    if (this._guessBgmOsc) { try { this._guessBgmOsc.stop(); } catch (e) {} this._guessBgmOsc = null; }
                    if (this._guessBgmGain) { this._guessBgmGain = null; }
                    if (this._guessBgwOsc2) { try { this._guessBgwOsc2.stop(); } catch (e) {} this._guessBgwOsc2 =
                        null; }
                    if (this._guessBgwGain2) { this._guessBgwGain2 = null; }
                },
                stopAllBgm() {
                    this.stopSnakeBgm();
                    this.stopGuessBgm();
                }
            };

            document.addEventListener('click', () => SoundFX.ensureCtx(), { once: true });
            document.addEventListener('touchstart', () => SoundFX.ensureCtx(), { once: true });
            document.addEventListener('keydown', () => SoundFX.ensureCtx(), { once: true });

            // ========== SVG图标库 ==========
            const ICON_SVGS = {
                '🍖': () =>
                    `<svg viewBox="0 0 64 64"><rect x="14" y="26" width="36" height="20" rx="8" fill="#c0392b"/><ellipse cx="32" cy="36" rx="10" ry="6" fill="#e74c3c"/><circle cx="22" cy="30" r="3" fill="#f1c40f"/><circle cx="42" cy="30" r="3" fill="#f1c40f"/><path d="M18 20 Q32 8 46 20" stroke="#f39c12" stroke-width="3" fill="none"><animate attributeName="d" values="M18 20 Q32 8 46 20;M18 18 Q32 6 46 18;M18 20 Q32 8 46 20" dur="2s" repeatCount="indefinite"/></path></svg>`,
                '🦴': () =>
                    `<svg viewBox="0 0 64 64"><g transform="rotate(-15 32 32)"><rect x="20" y="26" width="24" height="12" rx="4" fill="#8e44ad"/><circle cx="20" cy="32" r="10" fill="#9b59b6"/><circle cx="44" cy="32" r="10" fill="#9b59b6"/><animateTransform attributeName="transform" type="rotate" values="-15 32 32;-10 32 32;-15 32 32" dur="3s" repeatCount="indefinite"/></g></svg>`,
                '🍗': () =>

            // 原有30道精品菜品（带详细教程）
            const CORE_DISHES = [
                { id: 1, name: '红烧肉', price: 38, category: '荤菜', emoji: '🍖', desc: '肥而不腻', video: '',
                    tutorial: '【红烧肉】\n1. 五花肉切3cm方块，冷水下锅焯水去血沫，捞出沥干。\n2. 锅中少油，加冰糖小火炒出糖色（琥珀色）。\n3. 放入肉块翻炒上色，加葱姜、八角、桂皮。\n4. 加料酒、生抽、老抽，倒入开水没过肉。\n5. 大火烧开转小火炖40-50分钟，收汁至浓稠即可。\n💡 关键：炒糖色火候要小，炖煮时间要足。' },
                { id: 2, name: '糖醋排骨', price: 42, category: '荤菜', emoji: '🦴', desc: '酸甜可口', video: '',
                    tutorial: '【糖醋排骨】\n1. 排骨剁小段焯水，加料酒姜片去腥。\n2. 热油炸至金黄捞出。\n3. 调糖醋汁：白糖+醋+生抽+番茄酱+水（比例3:2:1:1:3）。\n4. 锅中留底油，倒入糖醋汁熬至粘稠。\n5. 放入排骨快速翻炒均匀，撒白芝麻出锅。\n💡 关键：糖醋比例要平衡，最后大火收汁。' },
                { id: 3, name: '宫保鸡丁', price: 28, category: '荤菜', emoji: '🍗', desc: '麻辣鲜香', video: '',
                    tutorial: '【宫保鸡丁】\n1. 鸡胸肉切丁，加盐、淀粉、料酒腌制15分钟。\n2. 花生米小火炒香备用。\n3. 调碗汁：生抽+醋+糖+淀粉+水。\n4. 热油爆香花椒、干辣椒，放入鸡丁滑炒至变色。\n5. 倒入碗汁翻炒，加花生米、葱段翻匀出锅。\n💡 关键：鸡丁要嫩，花生要脆，麻辣适中。' },
                { id: 4, name: '麻婆豆腐', price: 22, category: '素菜', emoji: '🫘', desc: '下饭神器', video: '',
                    tutorial: '【麻婆豆腐】\n1. 嫩豆腐切2cm方块，盐水浸泡10分钟。\n2. 牛肉末炒香备用。\n3. 热油加郫县豆瓣酱炒出红油，加姜蒜末。\n4. 加高汤或水，放入豆腐轻轻推匀。\n5. 加花椒粉、牛肉末，水淀粉勾芡，撒葱花。\n💡 关键：豆腐要嫩不碎，豆瓣酱要炒香。' },
                { id: 5, name: '西红柿炒鸡蛋', price: 18, category: '素菜', emoji: '🍅', desc: '营养美味', video: '',
                    tutorial: '【西红柿炒鸡蛋】\n1. 鸡蛋打散加少许盐，西红柿切块。\n2. 热油炒鸡蛋至凝固盛出。\n3. 锅中加油炒西红柿至出汁。\n4. 加少许糖提鲜，倒回鸡蛋翻炒。\n5. 加盐调味，撒葱花出锅。\n💡 关键：鸡蛋先炒嫩，西红柿要炒出汁。' },
                { id: 6, name: '酸辣土豆丝', price: 16, category: '素菜', emoji: '🥔', desc: '爽脆酸辣', video: '',
                    tutorial: '【酸辣土豆丝】\n1. 土豆去皮切细丝，清水浸泡去淀粉。\n2. 干辣椒剪段，蒜切片。\n3. 热油爆香辣椒和蒜。\n4. 放入沥干的土豆丝大火快炒。\n5. 加醋、盐调味，翻炒1-2分钟出锅。\n💡 关键：土豆丝要细且均匀，全程大火快炒保持脆爽。' },
                { id: 7, name: '米饭', price: 2, category: '主食', emoji: '🍚', desc: '香喷喷', video: '',
                    tutorial: '【蒸米饭】\n1. 大米淘洗2-3遍，不要过度搓洗。\n2. 米水比例约1:1.2（手指插入触到米，水面到第一关节）。\n3. 浸泡15-20分钟后开始蒸煮。\n4. 电饭煲跳闸后焖5-10分钟。\n5. 用饭勺打散即可。\n💡 关键：浸泡让米粒充分吸水，口感更佳。' },
                { id: 8, name: '紫菜蛋花汤', price: 12, category: '汤品', emoji: '🍲', desc: '鲜美', video: '',
                    tutorial: '【紫菜蛋花汤】\n1. 紫菜撕碎，鸡蛋打散备用。\n2. 锅中加水烧开，加少许盐和鸡精。\n3. 放入紫菜煮1分钟。\n4. 转小火，沿筷子缓缓倒入蛋液形成蛋花。\n5. 淋香油，撒葱花即可。\n💡 关键：倒蛋液时火要小，蛋花才漂亮。' },
                { id: 9, name: '回锅肉', price: 35, category: '荤菜', emoji: '🥩', desc: '经典川味', video: '',
                    tutorial: '【回锅肉】\n1. 五花肉整块煮至八成熟，切薄片。\n2. 青蒜切段，豆瓣酱剁细。\n3. 热锅少油，肉片煸炒至卷曲出油。\n4. 加豆瓣酱炒出红油，加甜面酱。\n5. 放入青蒜翻炒断生即可。\n💡 关键：肉片要薄，煸炒要出油卷曲。' },
                { id: 10, name: '鱼香肉丝', price: 32, category: '荤菜', emoji: '🐟', desc: '酸甜微辣', video: '',
                    tutorial: '【鱼香肉丝】\n1. 猪里脊切丝，加盐、淀粉腌制。\n2. 木耳、胡萝卜、青椒切丝。\n3. 调鱼香汁：生抽+醋+糖+淀粉+水。\n4. 热油滑炒肉丝变色盛出。\n5. 炒香豆瓣酱，加配菜和肉丝，倒鱼香汁翻匀。\n💡 关键：鱼香味型是酸甜微辣，糖醋比例要恰当。' },
                { id: 11, name: '京酱肉丝', price: 36, category: '荤菜', emoji: '🥢', desc: '酱香浓郁', video: '',
                    tutorial: '【京酱肉丝】\n1. 猪里脊切丝，加蛋清、淀粉上浆。\n2. 甜面酱加糖、水调稀。\n3. 热油滑炒肉丝至变白盛出。\n4. 锅中炒香甜面酱。\n5. 放入肉丝翻炒裹匀酱汁，配葱丝、豆腐皮食用。\n💡 关键：酱要炒香，肉丝要嫩滑。' },
                { id: 12, name: '木须肉', price: 30, category: '荤菜', emoji: '🍳', desc: '家常小炒', video: '',
                    tutorial: '【木须肉】\n1. 猪里脊切片，加料酒、淀粉腌制。\n2. 鸡蛋炒熟盛出，木耳黄花菜泡发。\n3. 热油炒肉片至变色。\n4. 加木耳黄花菜翻炒。\n5. 倒回鸡蛋，加盐、生抽调味。\n💡 关键：食材丰富，色彩搭配好看。' },
                { id: 13, name: '椒盐里脊', price: 40, category: '荤菜', emoji: '🧂', desc: '外酥里嫩', video: '',
                    tutorial: '【椒盐里脊】\n1. 猪里脊切条，加盐、料酒腌制。\n2. 调面糊：面粉+淀粉+鸡蛋+水。\n3. 肉条裹面糊，六成热油炸至金黄。\n4. 捞出复炸一次更酥脆。\n5. 撒椒盐粉（花椒粉+盐）拌匀。\n💡 关键：复炸是酥脆的秘诀，椒盐要现调。' },
                { id: 14, name: '可乐鸡翅', price: 34, category: '荤菜', emoji: '🍗', desc: '甜香入味', video: '',
                    tutorial: '【可乐鸡翅】\n1. 鸡翅洗净，两面划刀。\n2. 冷水焯水去血沫。\n3. 热油煎至两面金黄。\n4. 倒入可乐（没过鸡翅），加生抽、姜片。\n5. 大火烧开转小火炖20分钟，收汁即可。\n💡 关键：可乐本身有甜度，无需额外加糖。' },
                { id: 15, name: '红烧鸡块', price: 33, category: '荤菜', emoji: '🐔', desc: '鸡肉鲜嫩', video: '',
                    tutorial: '【红烧鸡块】\n1. 鸡腿剁块焯水。\n2. 热油炒糖色，加鸡块翻炒。\n3. 加葱姜蒜、八角、料酒、生抽、老抽。\n4. 加水没过鸡块，大火烧开转小火炖30分钟。\n5. 加盐调味，收汁出锅。\n💡 关键：鸡肉先焯水去腥，炖煮时间要够。' },
                { id: 16, name: '葱爆羊肉', price: 45, category: '荤菜', emoji: '🐑', desc: '葱香四溢', video: '',
                    tutorial: '【葱爆羊肉】\n1. 羊肉切薄片，加料酒、生抽、淀粉腌制。\n2. 大葱斜切段。\n3. 热油大火爆炒羊肉至变色。\n4. 放入大葱快速翻炒。\n5. 加盐、孜然调味，30秒出锅。\n💡 关键：全程大火快炒，羊肉嫩葱香。' },
                { id: 17, name: '孜然牛肉', price: 48, category: '荤菜', emoji: '🐮', desc: '烧烤风味', video: '',
                    tutorial: '【孜然牛肉】\n1. 牛肉逆纹切薄片。\n2. 加料酒、生抽、淀粉腌制20分钟。\n3. 热油滑炒牛肉至变色。\n4. 加孜然粉、辣椒粉、盐。\n5. 大火翻炒均匀，撒白芝麻。\n💡 关键：牛肉要逆纹切才嫩，孜然要足量。' },
                { id: 18, name: '干煸豆角', price: 20, category: '素菜', emoji: '🫛', desc: '咸鲜微辣', video: '',
                    tutorial: '【干煸豆角】\n1. 豆角去筋掰段，沥干水分。\n2. 热油煸炒豆角至表皮起皱。\n3. 盛出豆角，留底油。\n4. 爆香干辣椒、花椒、蒜末。\n5. 倒回豆角，加盐、生抽翻炒。\n💡 关键：豆角一定要煸熟煸透，生豆角有毒。' },
                { id: 19, name: '地三鲜', price: 24, category: '素菜', emoji: '🍆', desc: '东北名菜', video: '',
                    tutorial: '【地三鲜】\n1. 土豆、茄子切滚刀块，青椒切片。\n2. 分别过油炸至金黄。\n3. 调碗汁：生抽+糖+淀粉+水。\n4. 锅中爆香蒜末，加所有食材。\n5. 倒入碗汁快速翻炒均匀。\n💡 关键：茄子吸油，可先拍淀粉再炸。' },
                { id: 20, name: '手撕包菜', price: 18, category: '素菜', emoji: '🥬', desc: '酸辣爽脆', video: '',
                    tutorial: '【手撕包菜】\n1. 包菜手撕成片（不用刀切）。\n2. 干辣椒剪段，蒜切片。\n3. 热油爆香辣椒蒜片。\n4. 放入包菜大火快炒。\n5. 加醋、盐、生抽，炒至断生。\n💡 关键：手撕比刀切更好吃，大火快炒保持脆爽。' },
                { id: 21, name: '蒜蓉西兰花', price: 22, category: '素菜', emoji: '🥦', desc: '清淡健康', video: '',
                    tutorial: '【蒜蓉西兰花】\n1. 西兰花掰小朵，盐水浸泡洗净。\n2. 沸水加盐焯烫1分钟捞出。\n3. 蒜切末（多些）。\n4. 热油炒香蒜末。\n5. 放入西兰花翻炒，加盐调味。\n💡 关键：焯水时间不宜长，保持翠绿色泽。' },
                { id: 22, name: '蚝油生菜', price: 16, category: '素菜', emoji: '🥬', desc: '简单快手', video: '',
                    tutorial: '【蚝油生菜】\n1. 生菜洗净掰开。\n2. 沸水焯烫10秒捞出摆盘。\n3. 调蚝油汁：蚝油+生抽+糖+水+淀粉。\n4. 锅中煮至粘稠。\n5. 浇在生菜上即可。\n💡 关键：生菜焯水要快，保持脆嫩。' },
                { id: 23, name: '家常豆腐', price: 20, category: '素菜', emoji: '🧈', desc: '软嫩鲜香', video: '',
                    tutorial: '【家常豆腐】\n1. 老豆腐切三角块。\n2. 热油煎至两面金黄。\n3. 木耳、青椒切片。\n4. 锅中炒香豆瓣酱，加配菜。\n5. 放入豆腐，加水焖煮入味。\n💡 关键：豆腐先煎定型，焖煮让味道渗入。' },
                { id: 24, name: '红烧茄子', price: 22, category: '素菜', emoji: '🍆', desc: '软烂入味', video: '',
                    tutorial: '【红烧茄子】\n1. 茄子切滚刀块，撒盐腌制出水。\n2. 挤干水分，拍淀粉。\n3. 热油炸至金黄。\n4. 调汁：生抽+糖+醋+淀粉+水。\n5. 锅中爆香蒜末，加茄子和汁翻炒。\n💡 关键：腌茄子去涩味，炸后不吸油。' },
                { id: 25, name: '虎皮青椒', price: 18, category: '素菜', emoji: '🫑', desc: '下饭神器', video: '',

            // ========== 视频链接解析 ==========
            function parseVideoUrl(url) {
                if (!url || !url.trim()) return null;
                url = url.trim();
                let match = url.match(
                    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
                if (match) return { type: 'youtube', id: match[1], embedUrl: 'https://www.youtube.com/embed/' + match[
                        1] };
                match = url.match(/bilibili\.com\/video\/(BV[a-zA-Z0-9]+)/);
                if (match) return { type: 'bilibili', id: match[1], embedUrl: 'https://player.bilibili.com/player.html?bvid=' +
                        match[1] + '&page=1' };
                if (/\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url)) return { type: 'direct', url: url };
                if (/^https?:\/\//.test(url)) return { type: 'link', url: url };
                return null;
            }

            function getVideoEmbedHTML(videoUrl) {
                const parsed = parseVideoUrl(videoUrl);
                if (!parsed) return '';
                if (parsed.type === 'youtube' || parsed.type === 'bilibili') {
                    return `<div class="tutorial-video-wrap"><iframe src="${escapeHtml(parsed.embedUrl)}" allowfullscreen allow="autoplay; encrypted-media" loading="lazy"></iframe></div>`;
                }
                if (parsed.type === 'direct') {
                    return `<div class="tutorial-video-wrap"><video controls preload="metadata" src="${escapeHtml(parsed.url)}" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;">您的浏览器不支持视频播放</video></div>`;
                }
                if (parsed.type === 'link') {
                    return `<div style="margin:12px 0;text-align:center;"><a href="${escapeHtml(parsed.url)}" target="_blank" rel="noopener" style="color:var(--primary);font-weight:600;text-decoration:underline;">🎬 点击查看视频教程</a></div>`;
                }
                return '';
            }

                const formattedTut = escapeHtml(tut).replace(/\n/g, '<br>');

                const content =
