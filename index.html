            function initSnakeGame() {
                const canvas = document.getElementById('snakeCanvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const wrap = document.getElementById('snakeCanvasWrap');
                const scoreEl = document.getElementById('snakeScore');
                const highScoreEl = document.getElementById('snakeHighScore');
                const oldOv = wrap.querySelector('.game-over-overlay');
                if (oldOv) oldOv.remove();
                const gs = 20;
                const cols = Math.floor(canvas.width / gs);
                const rows = Math.floor(canvas.height / gs);
                let snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
                let food = { x: 14, y: 10 };
                let dir = { x: 1, y: 0 },
                    ndir = { x: 1, y: 0 };
                let score = 0,
                    highScore = parseInt(localStorage.getItem(STORAGE.SNAKE_HIGH) || '0');
                let gameOver = false,
                    gameSpeed = 120,
                    lastTime = 0;
                highScoreEl.textContent = highScore;
                scoreEl.textContent = '0';
                SoundFX.startSnakeBgm(gameSpeed);

                function spawnFood() { let fx, fy; do { fx = Math.floor(Math.random() * cols);
                        fy = Math.floor(Math.random() * rows); } while (snake.some(s => s.x === fx && s.y ===
                    fy));
                    food = { x: fx, y: fy }; }

                function draw() { ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
                    ctx.lineWidth = 0.5; for (let i = 0; i <= cols; i++) { ctx.beginPath();
                        ctx.moveTo(i * gs, 0);
                        ctx.lineTo(i * gs, canvas.height);
                        ctx.stroke(); } for (let i = 0; i <= rows; i++) { ctx.beginPath();
                        ctx.moveTo(0, i * gs);
                        ctx.lineTo(canvas.width, i * gs);
                        ctx.stroke(); }
                    snake.forEach((seg, i) => { const gx = seg.x * gs,
                            gy = seg.y * gs; const gr = ctx.createRadialGradient(gx + gs / 2, gy + gs / 2, 2,
                                gx + gs / 2, gy + gs / 2, gs / 2);
                        gr.addColorStop(0, i === 0 ? '#5effc8' : '#4ecca3');
                        gr.addColorStop(1, i === 0 ? '#3daa80' : '#2d8a65');
                        ctx.fillStyle = gr;
                        ctx.beginPath(); if (ctx.roundRect) ctx.roundRect(gx + 1, gy + 1, gs - 2, gs - 2, 4); else ctx
                            .arc(gx + gs / 2, gy + gs / 2, gs / 2 - 1, 0, Math.PI * 2);
                        ctx.fill(); if (i === 0) { ctx.fillStyle = '#fff'; let ex = gx + gs * 0.65,
                                ey = gy + gs * 0.3; if (dir.x === -1) ex = gx + gs * 0.25; if (dir.y ===
                                -1) ey = gy + gs * 0.25; if (dir.y === 1) ey = gy + gs * 0.7;
                            ctx.beginPath();
                            ctx.arc(ex, ey, 3, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.arc(ex, ey + gs * 0.35, 3, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.fillStyle = '#111';
                            ctx.beginPath();
                            ctx.arc(ex, ey, 1.5, 0, Math.PI * 2);
                            ctx.fill();
                            ctx.beginPath();
                            ctx.arc(ex, ey + gs * 0.35, 1.5, 0, Math.PI * 2);
                            ctx.fill(); } }); const fx = food.x * gs + gs / 2,
                        fy = food.y * gs + gs / 2; const fg = ctx.createRadialGradient(fx, fy, 2, fx, fy, gs / 2);
                    fg.addColorStop(0, '#ff6b6b');
                    fg.addColorStop(1, '#c0392b');
                    ctx.fillStyle = fg;
                    ctx.beginPath();
                    ctx.arc(fx, fy, gs / 2 - 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.beginPath();
                    ctx.arc(fx - 2, fy - 2, gs / 5, 0, Math.PI * 2);
                    ctx.fill(); }

                function update() { if (gameOver) return;
                    dir = { ...ndir }; const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
                    if (head.x < 0) head.x = cols - 1;
                    else if (head.x >= cols) head.x = 0;
                    if (head.y < 0) head.y = rows - 1;
                    else if (head.y >= rows) head.y = 0;
                    if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }
                    snake.unshift(head);
                    SoundFX.move(); if (head.x === food.x && head.y === food.y) { score += 10;
                        scoreEl.textContent = score;
                        spawnFood();
                        gameSpeed = Math.max(50, 120 - Math.floor(score / 20));
                        SoundFX.updateSnakeBgmSpeed(gameSpeed);
                        SoundFX.eat(); } else snake.pop();
                    draw(); }

                function endGame() { gameOver = true;
                    SoundFX.stopSnakeBgm(); if (score > highScore) { highScore = score;
                        localStorage.setItem(STORAGE.SNAKE_HIGH, highScore);
                        highScoreEl.textContent = highScore; }
                    SoundFX.gameOver(); const ov = document.createElement('div');
                    ov.className = 'game-over-overlay';
                    ov.innerHTML =
                        `<h3>🎮 游戏结束</h3><p style="font-size:1.2rem;">得分：<strong>${score}</strong></p><button class="btn btn-primary" id="btnSnakeRetry">🔄 再来一局</button>`;
                    wrap.appendChild(ov);
                    document.getElementById('btnSnakeRetry').onclick = () => { ov.remove();
                        resetGame(); }; }

                function resetGame() { const oldOv = wrap.querySelector('.game-over-overlay'); if (oldOv) oldOv
                    .remove();
                    snake = [{ x: 8, y: 10 }, { x: 7, y: 10 }, { x: 6, y: 10 }];
                    dir = { x: 1, y: 0 };
                    ndir = { x: 1, y: 0 };
                    score = 0;
                    gameSpeed = 120;
                    gameOver = false;
                    scoreEl.textContent = '0';
                    SoundFX.startSnakeBgm(gameSpeed);
                    spawnFood();
                    draw();
                    lastTime = performance.now(); if (snakeLoopId) cancelAnimationFrame(snakeLoopId);
                    snakeLoopId = requestAnimationFrame(gameLoop); }

                function gameLoop(ts) { if (!gameOver && document.getElementById('page-game').classList.contains(
                            'active')) { if (ts - lastTime >= gameSpeed) { update();
                            lastTime = ts; }
                        snakeLoopId = requestAnimationFrame(gameLoop); } else if (!gameOver) { snakeLoopId =
                        requestAnimationFrame(gameLoop); } else { SoundFX.stopSnakeBgm(); } }

                function handleKey(e) { const km = { 'ArrowUp': { x: 0, y: -1 }, 'ArrowDown': { x: 0, y: 1 },
                        'ArrowLeft': { x: -1, y: 0 }, 'ArrowRight': { x: 1, y: 0 }, 'w': { x: 0, y: -1 },
                        's': { x: 0, y: 1 }, 'a': { x: -1, y: 0 }, 'd': { x: 1, y: 0 }, 'W': { x: 0, y: -1 },
                        'S': { x: 0, y: 1 }, 'A': { x: -1, y: 0 }, 'D': { x: 1, y: 0 } }; const nd = km[e.key]; if (
                        nd) { e.preventDefault(); if (nd.x !== -dir.x || nd.y !== -dir.y) ndir = nd; } }
                let tsx = 0,
                    tsy = 0;
                canvas.addEventListener('touchstart', e => { e.preventDefault();
                    tsx = e.touches[0].clientX;
                    tsy = e.touches[0].clientY; }, { passive: false });
                canvas.addEventListener('touchend', e => { e.preventDefault(); const dx = (e.changedTouches[0]
                        ?.clientX || tsx) - tsx; const dy = (e.changedTouches[0]?.clientY || tsy) - tsy; if (Math
                        .max(Math.abs(dx), Math.abs(dy)) < 15) return; let nd; if (Math.abs(dx) > Math.abs(dy))
                        nd = { x: dx > 0 ? 1 : -1, y: 0 }; else nd = { x: 0, y: dy > 0 ? 1 : -1 }; if (nd.x !== -
                        dir.x || nd.y !== -dir.y) ndir = nd; }, { passive: false });
                document.addEventListener('keydown', handleKey);
                document.getElementById('btnSnakeRestart').onclick = () => { resetGame();
                    SoundFX.click(); };
                draw();
                lastTime = performance.now();
                snakeLoopId = requestAnimationFrame(gameLoop);
                snakeGame = { destroy() { gameOver = true;
                        SoundFX.stopSnakeBgm(); if (snakeLoopId) cancelAnimationFrame(snakeLoopId);
                        snakeLoopId = null;
                        document.removeEventListener('keydown', handleKey); const ov = wrap.querySelector(
                            '.game-over-overlay'); if (ov) ov.remove(); }, reset() { resetGame(); } };
            }

            function destroySnakeGame() { if (snakeGame) { snakeGame.destroy();
                    snakeGame = null; } if (snakeLoopId) { cancelAnimationFrame(snakeLoopId);
                    snakeLoopId = null; }
                SoundFX.stopSnakeBgm(); }

            // ========== 猜数字（含背景音效） ==========
            let guessGame = { target: 0, attempts: 0, history: [], finished: false };

            function initGuessGame() { guessGame.target = Math.floor(Math.random() * 100) + 1;
                guessGame.attempts = 0;
                guessGame.history = [];
                guessGame.finished = false; const inp = document.getElementById('guessInput'); if (inp) { inp.value = '';
                    inp.disabled = false;
                    inp.focus(); } const hint = document.getElementById('guessHint'); if (hint) { hint.textContent = '';
                    hint.style.color = ''; } const hd = document.getElementById('guessHistory'); if (hd) hd.innerHTML = ''; const
                    bs = document.getElementById('btnGuessSubmit'); if (bs) bs.style.display = ''; const br = document
                    .getElementById('btnGuessRestart'); if (br) br.style.display = 'none';
                SoundFX.startGuessBgm(); }

            function submitGuess() { if (guessGame.finished) return; const inp = document.getElementById('guessInput'); if (
                    !inp) return; const v = parseInt(inp.value); if (isNaN(v) || v < 1 || v > 100) { const hint = document
                        .getElementById('guessHint'); if (hint) { hint.textContent = '⚠️ 请输入1-100之间的数字';
                        hint.style.color = '#e09b4c'; }
                    SoundFX.wrong(); return; }
                guessGame.attempts++; const r = v > guessGame.target ? 'high' : v < guessGame.target ? 'low' : 'correct';
                guessGame.history.push({ val: v, result: r }); const hint = document.getElementById('guessHint'); if (r ===
                    'high') { if (hint) { hint.textContent = '📈 太大了！';
                        hint.style.color = '#e07b4c'; }
                    SoundFX.wrong(); } else if (r === 'low') { if (hint) { hint.textContent = '📉 太小了！';
                        hint.style.color = '#5a8fbf'; }
                    SoundFX.wrong(); } else { if (hint) { hint.textContent = '🎉 恭喜！共猜了 ' + guessGame.attempts + ' 次';
                        hint.style.color = 'var(--success)'; }
                    guessGame.finished = true;
                    document.getElementById('btnGuessSubmit').style.display = 'none';
                    document.getElementById('btnGuessRestart').style.display = '';
                    inp.disabled = true;
                    SoundFX.stopGuessBgm();
                    SoundFX.guessCorrect(); }
                inp.value = '';
                inp.focus();
                renderGuessHistory(); }

            function renderGuessHistory() { const hd = document.getElementById('guessHistory'); if (!hd) return;
                hd.innerHTML = guessGame.history.map((h, i) => { let cls = h.result === 'high' ? 'too-high' : h.result ===
                        'low' ? 'too-low' : 'correct'; let icon = h.result === 'high' ? '⬆️' : h.result === 'low' ?
                        '⬇️' : '✅'; let label = h.result === 'high' ? '太大' : h.result === 'low' ? '太小' : '正确!'; return (
                        `<div class="gh-item ${cls}"><span>#${i+1} 猜：${h.val}</span><span>${icon} ${label}</span></div>`
                        ); }).join(''); }

            function destroyGuessGame() { SoundFX.stopGuessBgm();
                guessGame.finished = true; }

            // ========== 打砖块 ==========
            let breakoutGame = null,
                breakoutLoopId = null;

            function initBreakoutGame() {
                const canvas = document.getElementById('breakoutCanvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const wrap = document.getElementById('breakoutCanvasWrap');
                const scoreEl = document.getElementById('breakoutScore');
                const highScoreEl = document.getElementById('breakoutHighScore');
                const oldOv = wrap.querySelector('.game-over-overlay');
                if (oldOv) oldOv.remove();
                const w = canvas.width,
                    h = canvas.height;
                let paddle = { x: w / 2 - 40, y: h - 25, w: 80, h: 12 };
                let ball = { x: w / 2, y: h - 40, r: 6, dx: 2, dy: -2.5 };
                let bricks = [];
                let score = 0,
                    highScore = parseInt(localStorage.getItem(STORAGE.BREAKOUT_HIGH) || '0');
                let gameOver = false,
                    gameWin = false;
                highScoreEl.textContent = highScore;
                scoreEl.textContent = '0';
                const brickRowCount = 5,
                    brickColCount = 8,
                    brickW = 40,
                    brickH = 18,
                    brickPad = 4,
                    brickOffsetTop = 40,
                    brickOffsetLeft = 20;

                function initBricks() { bricks = []; for (let r = 0; r < brickRowCount; r++) for (let c = 0; c <
                        brickColCount; c++) bricks.push({ x: c * (brickW + brickPad) + brickOffsetLeft, y: r * (
                            brickH + brickPad) + brickOffsetTop, status: 1 }); }

                function draw() { ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(0, 0, w, h);
                    bricks.forEach(b => { if (b.status === 1) { ctx.fillStyle = '#e07b4c';
                            ctx.fillRect(b.x, b.y, brickW, brickH); } });
                    ctx.fillStyle = '#4ecca3';
                    ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
                    ctx.beginPath();
                    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                    ctx.fillStyle = '#ff6b6b';
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.font = '14px sans-serif';
                    ctx.fillText('Score: ' + score, 8, 16); }

                function update() { if (gameOver || gameWin) return;
                    ball.x += ball.dx;
                    ball.y += ball.dy; if (ball.x - ball.r < 0 || ball.x + ball.r > w) { ball.dx = -ball.dx;
                        SoundFX.pinballBounce(); } if (ball.y - ball.r < 0) { ball.dy = -ball.dy;
                        SoundFX.pinballBounce(); } if (ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle
                        .x + paddle.w) { ball.dy = -Math.abs(ball.dy);
                        SoundFX.paddle(); } else if (ball.y + ball.r > h) { gameOver = true;
                        SoundFX.gameOver(); }
                    bricks.forEach(b => { if (b.status === 1 && ball.x > b.x && ball.x < b.x + brickW && ball.y > b
                            .y && ball.y < b.y + brickH) { b.status = 0;
                            ball.dy = -ball.dy;
                            score += 10;
                            scoreEl.textContent = score;
                            SoundFX.brick(); } }); if (bricks.every(b => b.status === 0)) gameWin = true;
                    draw(); }

                function resetGame() { const oldOv = wrap.querySelector('.game-over-overlay'); if (oldOv) oldOv.remove();
                    paddle.x = w / 2 - 40;
                    ball = { x: w / 2, y: h - 40, r: 6, dx: 2, dy: -2.5 };
                    score = 0;
                    gameOver = false;
                    gameWin = false;
                    scoreEl.textContent = '0';
                    initBricks();
                    draw(); if (breakoutLoopId) cancelAnimationFrame(breakoutLoopId);
                    breakoutLoopId = requestAnimationFrame(loop); }

                function loop() { if (!gameOver && !gameWin) { update();
                        breakoutLoopId = requestAnimationFrame(loop); } else { if (gameOver && score > highScore) {
                            highScore = score;
                            localStorage.setItem(STORAGE.BREAKOUT_HIGH, highScore);
                            highScoreEl.textContent = highScore; } const ov = document.createElement('div');
                        ov.className = 'game-over-overlay';
                        ov.innerHTML =
                            `<h3>${gameWin?'🎉 你赢了！':'💥 游戏结束'}</h3><p>得分：<strong>${score}</strong></p><button class="btn btn-primary" id="btnBreakoutRetry">🔄 再来一局</button>`;
                        wrap.appendChild(ov);
                        document.getElementById('btnBreakoutRetry').onclick = () => { ov.remove();
                            resetGame(); }; } }

                function handleKey(e) { if (e.key === 'ArrowLeft') { paddle.x = Math.max(0, paddle.x - 20);
                        SoundFX.paddle(); } else if (e.key === 'ArrowRight') { paddle.x = Math.min(w - paddle.w, paddle
                            .x + 20);
                        SoundFX.paddle(); } }
                let touchX = 0;
                canvas.addEventListener('touchmove', e => { e.preventDefault();
                    touchX = e.touches[0].clientX; const rect = canvas.getBoundingClientRect(); const relX = touchX - rect
                        .left;
                    paddle.x = Math.max(0, Math.min(w - paddle.w, relX - paddle.w / 2)); }, { passive: false });
                document.addEventListener('keydown', handleKey);
                document.getElementById('btnBreakoutRestart').onclick = resetGame;
                initBricks();
                draw();
                breakoutLoopId = requestAnimationFrame(loop);
                breakoutGame = { destroy() { gameOver = true; if (breakoutLoopId) cancelAnimationFrame(breakoutLoopId);
                        breakoutLoopId = null;
                        document.removeEventListener('keydown', handleKey); const ov = wrap.querySelector(
                            '.game-over-overlay'); if (ov) ov.remove(); }, reset() { resetGame(); } };
            }

            function destroyBreakoutGame() { if (breakoutGame) { breakoutGame.destroy();
                    breakoutGame = null; } if (breakoutLoopId) { cancelAnimationFrame(breakoutLoopId);
                    breakoutLoopId = null; } }

            // ========== 游戏页面切换 ==========
            function renderGamePage() {
                const ag = document.querySelector('.game-select-btn.active')?.dataset.game || 'snake';
                const containers = {
                    snake: document.getElementById('gameSnakeContainer'),
                    guess: document.getElementById('gameGuessContainer'),
                    breakout: document.getElementById('gameBreakoutContainer')
                };
                Object.keys(containers).forEach(k => { if (containers[k]) containers[k].style.display = k === ag ? '' :
                        'none'; });
                destroySnakeGame();
                destroyBreakoutGame();
                SoundFX.stopAllBgm();
                if (ag === 'snake') initSnakeGame();
                else if (ag === 'breakout') initBreakoutGame();
                else if (ag === 'guess') { destroyGuessGame();
                    initGuessGame(); }
            }
            document.querySelectorAll('.game-select-btn').forEach(b => b.onclick = () => { document.querySelectorAll(
                        '.game-select-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                SoundFX.click();
                renderGamePage(); });

            // ========== Toast & Modal ==========
            window.showToast = function(msg, type = 'info') { const t = document.createElement('div');
                t.className = 'toast toast-' + (type === 'warning' ? 'warning' : type === 'success' ? 'success' :
                    'info');
                t.textContent = msg;
                document.getElementById('toastContainer').appendChild(t);
                setTimeout(() => { t.style.opacity = '0';
                    t.style.transition = '0.3s';
                    setTimeout(() => t.remove(), 300); }, 2600); };
            async function showModal(title, msg, buttons, extraHtml = '') { return new Promise(resolve => { const ov =
                        document.createElement('div');
                    ov.className = 'modal-overlay'; const d = document.createElement('div');
                    d.className = 'modal-dialog';
                    d.innerHTML = (title ? '<h3>' + title + '</h3>' : '') + '<div style="margin:12px 0;">' + msg +
                        '</div>' + extraHtml + '<div class="btn-row"></div>'; const row = d.querySelector('.btn-row');
                    buttons.forEach(b => { const btn = document.createElement('button');
                        btn.className = 'btn ' + (b.cls || 'btn-primary');
                        btn.textContent = b.text;
                        btn.onclick = () => { if (b.action) b.action();
                            ov.remove();
                            resolve(b.value || b.text); };
                        row.appendChild(btn); });
                    ov.appendChild(d);
                    ov.onclick = e => { if (e.target === ov) { ov.remove();
                            resolve(null); } };
                    document.body.appendChild(ov);
                    setTimeout(() => { const inp = d.querySelector('input'); if (inp) inp.focus(); }, 150); }); }
            window.showModal = showModal;

            function switchPage(name) {
                if (name !== 'game') {
                    SoundFX.stopAllBgm();
                    destroySnakeGame();
                    destroyBreakoutGame();
                    destroyGuessGame();
                }
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t
                    .dataset.page === name));
                document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + name)); if (
                    name === 'order') renderOrderPage(); else if (name === 'cart') renderCartPage(); else if (name ===
                    'shared') renderSharedOrders(); else if (name === 'manage') renderManagePage(); else if (name ===
                    'game') renderGamePage(); else { destroySnakeGame();
                    destroyBreakoutGame();
                    destroyGuessGame();
                    SoundFX.stopAllBgm(); } }
            document.querySelectorAll('.nav-tab').forEach(t => t.onclick = () => switchPage(t.dataset.page));

            function refreshView() { const a = document.querySelector('.page.active')?.id.replace('page-', ''); if (a ===
                    'order') applyFilters(); else if (a === 'cart') renderCartPage(); else if (a === 'shared')
                renderSharedOrders(); }
            searchInput.addEventListener('input', () => { if (document.getElementById('page-order').classList.contains(
                    'active')) applyFilters(); });
            btnClearSearch.addEventListener('click', () => { searchInput.value = '';
                applyFilters(); });

            let deferredPrompt;
            window.addEventListener('beforeinstallprompt', e => { e.preventDefault();
                deferredPrompt = e;
                document.getElementById('btnInstall').classList.add('show'); });
            document.getElementById('btnInstall').onclick = () => { if (deferredPrompt) { deferredPrompt.prompt();
                    deferredPrompt = null; } };
            if ('serviceWorker' in navigator) { try { const sw =
                    "const C='dinner-v13';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));";
                    const b = new Blob([sw], { type: 'application/javascript' });
                    navigator.serviceWorker.register(URL.createObjectURL(b), { scope: '/' }).catch(() => {}); } catch (
                e) {} }
            document.getElementById('btnClearSharedOrders').onclick = () => clearMySharedOrders();
            document.getElementById('btnClearHistory').onclick = async () => { if (await showModal('清除历史',
                    '确定清除本房间所有已确认历史订单吗？', [{ text: '取消', cls: 'btn-secondary' }, { text: '清除',
                        cls: 'btn-danger-outline' }
                ])) { clearHistory(currentRoom);
                renderSharedOrders();
                showToast('历史订单已清除'); } };
            document.getElementById('btnGuessSubmit').onclick = submitGuess;
            document.getElementById('btnGuessRestart').onclick = () => { initGuessGame();
                SoundFX.click(); };
            document.getElementById('guessInput').addEventListener('keydown', e => { if (e.key === 'Enter') submitGuess
            (); });

            function init() {
                loadMenu();
                loadCart();
                loadNickname();
                loadRoom();
                syncCartMenu();
                updateCartBadge();
                initHistoryIds(currentRoom);
                roomInput.value = currentRoom;
                displayRoomName.textContent = currentRoom; if (!gun && window.__gunLoaded && typeof Gun !== 'undefined')
                    initGun();
                subscribeShared();
                switchPage('order');
                updateNickBtn(); }
            if (window.__gunLoaded || typeof Gun !== 'undefined') init();
            else { let wc = 0; const wi = setInterval(() => { wc++; if (window.__gunLoaded || typeof Gun !==
                        'undefined' || wc > 30) { clearInterval(wi); if (!gun && typeof Gun !== 'undefined')
                        initGun();
                    init(); } }, 200); }
        })();
    </script>
